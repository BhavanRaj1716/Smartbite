<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Smart Canteen – Admin</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Admin Login Screen ── */
    #adminLoginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      z-index: 10;
    }
    .adminLoginCard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .adminLoginCard h2 {
      font-family: var(--display);
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .adminLoginCard p {
      font-size: 0.75rem;
      color: var(--textDim);
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }
    .adminGoogleBtn {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #1f1f1f;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: box-shadow 0.15s;
      margin-bottom: 14px;
    }
    .adminGoogleBtn:hover    { box-shadow: 0 1px 6px rgba(0,0,0,0.2); }
    .adminGoogleBtn:disabled { opacity: 0.6; cursor: not-allowed; }
    #adminLoginError {
      color: var(--red);
      font-size: 0.75rem;
      min-height: 18px;
      margin-top: 10px;
    }
    #adminLogoutBtn {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 6px 14px;
      border: 1px solid var(--red);
      background: transparent;
      color: var(--red);
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #adminLogoutBtn:hover { background: var(--red); color: #fff; }

    /* ── Admin-specific badge styles ── */
    .payBadge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      vertical-align: middle;
    }
    .btnVerifyPayment {
      display: inline-block;
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #4ade80;
      background: rgba(74,222,128,0.1);
      color: #4ade80;
      cursor: pointer;
      margin-left: 6px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btnVerifyPayment:hover { background: rgba(74,222,128,0.22); }
    .payVerified {
      display: inline-block;
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid rgba(74,222,128,0.4);
      color: #4ade80;
      margin-left: 6px;
    }
    .orderTime {
      font-size: 0.72rem;
      opacity: 0.5;
    }
    .statBox.accent { border-color: rgba(167,139,250,0.27); }
  </style>
</head>
<body>

  <!-- ══ ADMIN LOGIN SCREEN ════════════════════════════════════ -->
  <div id="adminLoginScreen">
    <div class="adminLoginCard">
      <h2>🍽 Admin Panel</h2>
      <p>Sign in with your authorised Google account to continue.</p>
      <button class="adminGoogleBtn" id="adminGoogleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google
      </button>
      <p id="adminLoginError"></p>
    </div>
  </div>

  <!-- ══ ADMIN DASHBOARD ════════════════════════════════════════ -->
  <div id="adminDashboard" style="display:none;">

    <header>
      <div class="headerLeft">
        <div class="dot"></div>
        <h1>ADMIN PANEL</h1>
      </div>
      <div class="headerRight" style="display:flex; align-items:center; gap:16px;">
        <span id="adminUserEmail" style="font-size:0.7rem; color:var(--textDim);"></span>
        <span id="liveClock" style="opacity:0.6; font-size:0.8rem;"></span>
        <button id="adminLogoutBtn">Logout</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="statBox">
        <h3>Total Orders</h3>
        <p id="totalOrders">0</p>
      </div>
      <div class="statBox">
        <h3>Delivered Revenue</h3>
        <p id="totalRevenue">₹0</p>
      </div>
      <div class="statBox accent">
        <h3>UPI Pending</h3>
        <p id="pendingRevenue">₹0</p>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button id="btnAll"       class="active">All Active</button>
      <button id="btnPreparing">Preparing</button>
      <button id="btnReady">Ready</button>
      <button id="btnDelivered">Delivered</button>
      <button id="btnToday">Today Only</button>
      <button id="btnCancelled">Cancelled</button>
    </div>

    <!-- Two-column layout -->
    <div id="panelLayout">
      <div id="ordersPanel">
        <div class="panelTitle"><span></span> Active Orders</div>
        <div id="adminOrders"></div>
      </div>
      <div id="historyPanel">
        <div class="panelTitle">
          <span style="background:var(--green);"></span> Delivered History
        </div>
        <div id="historyOrders"></div>
      </div>
    </div>

  </div><!-- /#adminDashboard -->

  <div id="toast"></div>

  <script type="module" src="admin.js"></script>

  <script>
    // Filter highlight sync
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".filters button").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
        });
      });
    });
  </script>

</body>
</html>
